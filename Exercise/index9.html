<!DOCTYPE html>

<!-- Without using br tag, Write a vertically aligned form asking for name, city and pincode of a user. -->

<body>
    <h1>Employee information form</h1>

    <form>
        <div>
            <label for="Username">Enter your name</label>
            <input type="text" id="Username" name="Username" placeholder="Enter your name">
        </div>

        <div>
            <label for="City">Enter your city name</label>
            <input type="text" id="City" name="Cityname" placeholder="Enter your city">
        </div>

        <div>
            <label for="Pincode">Enter your pincode</label>
            <input type="number" id="Pincode" name="Pincode" placeholder="Enter your pincode">
        </div>
    </form>
</body>

</html>
