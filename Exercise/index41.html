<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise - Navbarusing flexbox</title>
    <style>
        .logo img {
            width: 164px;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .right ul {
            display: flex;
            gap: 34px;
        }

        .right ul li {
            list-style: none;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="ss3.png" alt="Logo img">
            </div>
            <div class="right">
                <ul>
                    <li>Produsts</li>
                    <li>Buy</li>
                    <li>Renew</li>
                    <li>Support</li>
                    <li>Learn</li>
                    <li>Company</li>
                </ul>
            </div>

        </nav>
    </header>
</body>

</html>
