<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Website</title>
</head>
<!-- Create a website which shows video of different category and audio of different categories.
 You can use Youtube videos in an iframe using Youtube's features-->

<body>
    <h1>Videos and Audio Categories</h1>

    <h2>Education Video</h2>
    <iframe width="400" height="250" src="https://youtu.be/oD7d34bIMxQ?si=SAND4dRH2YCrum9C"
        title="Education Video"></iframe>

    <h2>Music Video</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/GaPeCuNIxro?si=1t-mNilTAdyrO1QW&amp;start=80"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h2>Sports Video</h2>
    <iframe width="400" height="250" src="https://www.youtube.com/embed/5qap5aO4i9A" title="Sports Video">
    </iframe>

    <hr>

    <h2>Motivational Audio</h2>
    <audio controls>
        <source src="motivational.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <h2>Devotional Audio</h2>
    <audio controls>
        <source src="devotional.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <h2>Music Audio</h2>
    <audio controls>
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

</body>

</html>
