<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a simple website</title>
</head>
<!--You are given 12 files; 6 audio and 6 video.
    Design a website only which shows these 12 files.
    1.mp, 2.mp3.... 6.mp3
    1.mp4, 2.mp4... 6.mp4 -->
<body>
    <h1>Audio Files</h1>

    <audio controls>
        <source src="1.mp3" type="audio/mpeg"><br><br>
    </audio>

    <audio controls>
        <source src="2.mp3" type="audio/mpeg"><br><br>
    </audio>

    <audio controls>
        <source src="3.mp3" type="audio/mpeg"><br><br>
    </audio>

    <audio controls>
        <source src="4.mp3" type="audio/mpeg"><br><br>
    </audio>

    <audio controls>
        <source src="5.mp3" type="audio/mpeg"><br><br>
    </audio>

    <audio controls>
        <source src="6.mp3" type="audio/mpeg"><br><br>
    </audio>

    <h1>Video Files</h1>

    <video width="320" height="240" controls>
        <source src="1.mp4" type="video/mp4">
    </video><br><br>

    <video width="320" height="240" controls>
        <source src="2.mp4" type="video/mp4">
    </video><br><br>


    <video width="320" height="240" controls>
        <source src="3.mp4" type="video/mp4">
    </video><br><br>

    <video width="320" height="240" controls>
        <source src="4.mp4" type="video/mp4">
    </video><br><br>

    <video width="320" height="240" controls>
        <source src="5.mp4" type="video/mp4">
    </video><br><br>

    <video width="320" height="240" controls>
        <source src="6.mp4" type="video/mp4">
    </video><br><br>
</body>
</html>
