<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation</title>
    <style>
        .container {
            background-color: rgb(6, 84, 84);
            height: 80vh;
            width: 30vw;
        }

        .box {
            /* background-color: aquamarine;*/
            width: 34px;
            height: 45px;
            /*animation: shivaniKaAnimation;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0.24, 0.03, 0.58, 1);
            animation-delay: 1s;
            animation-direction: alternate-reverse; */
            /* animation-play-state:running; */
            animation: shivaniKaAnimation 2s ease-in-out 3s 1,
                        shiva2 3s ease-in-out 3s 1 ;
        }
        @keyframes shivaniKaAnimation{
            from{
background-color: rgb(255, 0, 21);
            }
            to{
                background-color: yellow;
transform: translateX(1000px);
            }
        }

        @keyframes shiva2{
            0%{
                transform: rotate(100deg);
            }
            20%{
                transform: rotate(200deg);
            }
            50%{
                transform: rotate(220deg);
            }
            80%{
                transform: rotate(300deg);
            }
            100%{
                transform: rotate(310deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            Box
        </div>
    </div>
</body>

</html>
