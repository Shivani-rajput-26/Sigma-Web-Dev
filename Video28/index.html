<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .box {
        border: 2px solid black;
        height: 433px;
        width: 80vw;
        padding: 3px;
        margin: 3px;
    }

    .box1 {
        background-color: aqua;
        /* position: sticky;
        top: 0px; */
        position: absolute;
        top: 0px;
        left: 3px;
    }

    .box2 {
        background-color: rgb(33, 168, 168);
        /* position: relative;
        top: 34px;
        left: 56px; */
    }

    .box3 {
        background-color: rgb(7, 82, 82);
        /* position: fixed; */
        bottom: 0px;
        left: 8vw;
        height: 111px;
    }

    .box4 {
        background-color: rgb(2, 46, 46);
    }

    .parent {
        /* EXCEPTION = transform, filter, perspective propertiescan also mane an element appear as positioned */
        padding: 43px;
        margin: 34px;
        border: 3px solid black;
        /* position: relative; */
        /* transform: translate(0); */
        /* filter: invert(0); = for colour*/
        /* perspective: 0em; = for position*/
    }
</style>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
