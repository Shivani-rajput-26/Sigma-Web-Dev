<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>
    <style>
        /* Element Selector */
        div{
            /* background-color: aquamarine; */
        }

        /* Class selector */
        .red{
            background-color: cadetblue;
        }

        /* ID Selector */
        #green{
            background-color: green;
        }

        /* Child Slector - Here p is a child of div; and only for direct child*/
        div > p{
            color: blue;
            background-color:hotpink ;
        }

        /* Descendant Selector */
        div p{
            color: cornflowerblue;
            background-color: aquamarine;
        }

        /* Universal Selector */
        *{
            margin: 0;
            padding: 0;
        }

        /* Pseudo Selector */
        a:visited{
            color: chartreuse;
        }

        a:link{
            color: rgb(38, 117, 120);
        }

        a:active{
            background-color: black;
        }

        a:hover{
            background-color: pink;
        }

        p:first-child{
            background-color: deeppink;
        }
    </style>
</head>
<body>
    <main class="one">
        <p>I am First</p>
        <p>I am Second</p>
    </main>
    <div class="red">
        I am div
        <p>I am a data Sceince student</p>
    </div>

    <div id="green">
        Hiiieeeee I am another div
        <article>
            <p>Heyyyyyyyyyyy I am descedant selector.</p>
        </article>
    </div>
    <a href="https:www.google.com">Go to Google</a>
    <a href="https:www.facebook.com">Go to Facebook</a>
</body>
</html>
