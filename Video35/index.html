        .boxes::before{
            content: "Shiva is good";
            color: darkgreen;
        }

        .boxes::after{
            content:" sigma course is also good";
            color: chocolate;
        }

        .boxes::selection{
            background-color: black;
            color: cyan;
        }

        .box::first-letter{
            color: rgb(235, 125, 125);
            font-size: 45px;
        }

        input::placeholder{
            color: rgb(90, 86, 94);
        }
    </style>
</head>
<body>
    <div class="boxes">
        <div data-color="primary" class="box">I am first box</div>
        <div class="box">Hey I am a box</div>
        <div class="box">Hey I am a box</div>
        <input type="text" placeholder="Type your name here">
    </div>
