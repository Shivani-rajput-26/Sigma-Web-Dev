<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Overflow Properties</title>
    <style>
        .box{
            width: 30vw;
            height: 30vh;
            border: 2px solid black;
            overflow: auto; /*more use auto rather than scroll  */
            overflow-x: hidden;
            overflow-y: scroll;
            /* overflow: auto; */
            /* white-space: nowrap; */
            /* text-overflow: ellipsis; = In box doted lines dikhaega aage */
        }
    </style>
</head>
<body>
    <div class="box">
        I am a good girl. Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas reprehenderit eveniet doloribus accusantium, error repellendus autem at possimus consectetur eos odio beatae quo qui asperiores.
    </div>
</body>
</html>
