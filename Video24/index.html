<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows and Outlines</title>
    <style>
        .box{
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 15px 5px #888;
        }
        .text-element{
            text-shadow: 2px 2px 4px #888;
            outline: 2px solid black;
            /* border-radius: 8px; */
            border: 2px solid green;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>

    <p class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Consectetur, consequuntur error neque quidem, veritatis, quos cupiditate eaque sapiente minus doloremque ea nisi incidunt! Natus dolor quam, aliquam vero nisi quisquam tenetur blanditiis dicta nobis?
    </p>
</body>
</html>
